<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Редактировать студента</title>
    <style>
        body{font-family:Inter, Roboto, Arial, sans-serif;background:#f4f7fb;color:#0f1724;margin:0;padding:0}
        .card{max-width:760px;margin:44px auto;background:#ffffff;border-radius:10px;padding:22px;box-shadow:0 6px 18px rgba(15,23,42,0.06)}
        header{display:flex;align-items:center;justify-content:space-between}
        h1{font-size:18px;margin:0}
        a{color:#0b69ff;text-decoration:none;font-size:14px}
        form table{width:100%;margin-top:12px}
        .controls{margin-top:12px}
        input[type="submit"]{background:#0b69ff;color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>Редактирование студента</h1>
            <a href="/kalinina_app/student/">← К списку</a>
        </header>

        <form method="post">
            {% csrf_token %}
            <table>
                {{ form.as_table }}
            </table>

            <div class="controls">
                <input type="submit" value="Сохранить изменения" />
            </div>
        </form>
    </div>
</body>
</html>
